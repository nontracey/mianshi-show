server:
  port: ${SERVER_PORT:8080}
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: java-ai-service
  # 默认排除 PgVectorStore 自动配置(避免和内存版 VectorStoreService Bean 冲突 + 连 Postgres 失败);
  # 启用 pgvector 模式时设 app.vector-store=pgvector 并去掉此 exclude(或用 profile)
  autoconfigure:
    exclude:
      - org.springframework.ai.autoconfigure.vectorstore.pgvector.PgVectorStoreAutoConfiguration
  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${LLM_MODEL:gpt-4o-mini}
          temperature: 0
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-3-small}
    # pgvector 生产向量库(app.vector-store=pgvector 时启用,需配 PG 连接)
    vectorstore:
      pgvector:
        dimensions: ${PGVECTOR_DIMENSIONS:1536}
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        initialize-schema: true
        table-name: vector_store
        schema-name: public

  # pgvector 数据源(仅 app.vector-store=pgvector 时用)
  datasource:
    url: ${PG_URL:jdbc:postgresql://localhost:5432/ai_service}
    username: ${PG_USER:postgres}
    password: ${PG_PASSWORD:postgres}

# 自定义配置
app:
  kb:
    content-url: ${KB_CONTENT_URL:https://raw.githubusercontent.com/nontracey/mianshi-zhilian-content/main/manifest.json}
    content-path: ${KB_CONTENT_PATH:}
    sample-path: ${KB_SAMPLE_PATH:../data/knowledge_base.sample.json}
  vector-store: ${VECTOR_STORE:memory}
  rate-limit-per-minute: ${RATE_LIMIT_PER_MINUTE:20}

springdoc:
  swagger-ui:
    path: /docs
  api-docs:
    path: /openapi.json

logging:
  level:
    com.nontracey.aiservice: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level [%X{traceId:-}] %logger{36} - %msg%n"
